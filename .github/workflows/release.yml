name: Release

# Builds native installers on each OS and publishes them to a GitHub Release.
# Triggered by pushing a version tag (e.g. v0.1.0), or manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build/release (e.g. v0.1.0)'
        required: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: macos-latest
            artifact: macos
          - os: ubuntu-latest
            artifact: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # node-pty is compiled from source via node-gyp, whose bundled gyp imports
      # distutils — removed from Python 3.12. Pin 3.11 (still ships distutils).
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        # sharp (pulled in by @xenova/transformers) downloads its libvips
        # binary at install time, and that download is flaky on CI runners.
        # Retry so a transient timeout doesn't sink the whole release.
        run: |
          for n in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt $n); retrying in 15s..."
            sleep 15
          done
          exit 1

      - name: Build renderer + main
        run: npm run build

      - name: Package (electron-builder)
        # --publish never: artifacts are collected and published by the release job
        # below. CSC_IDENTITY_AUTO_DISCOVERY=false skips macOS code signing (no certs).
        run: npx electron-builder --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.snap
            dist/latest*.yml
            dist/*.blockmap

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Needed so the per-release notes can be pulled from CHANGELOG.md below.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      # Build the release body from the matching CHANGELOG.md section (the
      # curated "what changed / new features" for this version), then append the
      # static downloads footer. action-gh-release additionally appends the
      # auto-generated commit list (generate_release_notes). If no section is
      # found the body still has the intro + downloads, so the release never
      # fails on an empty body.
      - name: Build release notes
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VER="${TAG#v}"
          SECTION=$(awk -v hdr="## [$VER]" '
            index($0, hdr)==1 {cap=1; next}
            cap && /^## \[/ {cap=0}
            cap && /^\[[A-Za-z0-9.]+\]: http/ {next}
            cap {print}
          ' CHANGELOG.md)
          {
            echo "Desktop workspace for running multiple AI coding CLI agents side-by-side with shared MCP memory."
            echo ""
            if [ -n "$SECTION" ]; then
              echo "## What's new in $TAG"
              echo "$SECTION"
            fi
            echo "### Downloads"
            echo "- **Windows** — \`.exe\` installer (NSIS) or portable \`.zip\`"
            echo "- **macOS** — \`.dmg\` (x64 + Apple Silicon; unsigned — right-click → Open on first launch)"
            echo "- **Linux** — \`.AppImage\` (x64)"
            echo ""
            echo "See the [README](https://github.com/0xnookie/swarmmind#readme) for setup."
          } > RELEASE_NOTES.md

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: SwarmMind ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: artifacts/**/*
          body_path: RELEASE_NOTES.md
