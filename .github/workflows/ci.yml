name: CI

# Type-checking is the project's primary correctness gate (no test suite).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        # sharp (pulled in by @xenova/transformers) downloads its libvips
        # binary at install time, and that download is flaky on CI runners.
        # Retry so a transient timeout doesn't fail the run.
        run: |
          for n in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt $n); retrying in 15s..."
            sleep 15
          done
          exit 1

      - name: Type-check (web + node)
        run: npm run typecheck

  smoke:
    name: Smoke (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # node-pty compiles from source via node-gyp; distutils was removed from
      # Python 3.12, so pin 3.11 (matches the release workflow).
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        # sharp (pulled in by @xenova/transformers) downloads its libvips
        # binary at install time, and that download is flaky on CI runners.
        # Retry so a transient timeout doesn't fail the run.
        run: |
          for n in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt $n); retrying in 15s..."
            sleep 15
          done
          exit 1

      # Rebuild node-pty / better-sqlite3 against the Electron ABI so they load
      # when the smoke test launches the app (npm ci builds them for Node).
      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Build (renderer + main)
        run: npm run build

      - name: Smoke test (boot the app)
        run: npm run smoke
