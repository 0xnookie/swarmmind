appId: dev.swarmmind.app
productName: SwarmMind
copyright: 'Copyright © 2025 SwarmMind'

# Update feed: embeds app-update.yml in the build and emits latest*.yml into
# dist/ so electron-updater can find new releases. Publishing itself is done by
# the release workflow (build runs with --publish never).
publish:
  provider: github
  owner: 0xnookie
  repo: swarmmind

directories:
  output: dist
  buildResources: resources

files:
  - 'out/**/*'
  - 'memory/**/*'
  - 'mcp/**/*'
  - '!**/*.map'
  # Native-addon debug symbols (node-pty ships ~54 MB of .pdb in its per-platform
  # prebuilds, better-sqlite3 a few more). Never loaded at runtime — the loader
  # resolves build/Release first.
  - '!**/*.pdb'
  # C/C++ sources & build intermediates for the two native addons; only needed by
  # node-gyp at rebuild time, not once build/Release/*.node exists. Scoped to
  # these packages so we never strip a JS dep that runs from src/.
  - '!**/node_modules/node-pty/{deps,third_party,src,scripts}/**'
  - '!**/node_modules/better-sqlite3/{deps,src}/**'
  - '!**/*.{o,obj,a,lib}'

# Trade a little build time for a noticeably smaller installer/download.
compression: maximum

# Artifact names MUST contain no spaces. electron-builder's default NSIS name is
# "${productName} Setup ${version}.${ext}" (with spaces); on upload GitHub turns
# spaces into dots ("SwarmMind.Setup.0.1.8.exe") while electron-updater turns
# them into dashes when building the download URL ("SwarmMind-Setup-0.1.8.exe"),
# so auto-update 404s. Dash-only templates keep the on-disk file, latest*.yml,
# and the uploaded asset byte-identical, so the updater always resolves them.
artifactName: '${productName}-${version}-${arch}.${ext}'

extraResources:
  - from: memory/schema.sql
    to: memory/schema.sql
  # Shipped so the main process can set the BrowserWindow icon at runtime
  # (taskbar / Alt-Tab) on Linux and as a cross-platform fallback.
  - from: resources/icon.png
    to: icon.png

asar: true
asarUnpack:
  - '**/node_modules/node-pty/**'
  - '**/node_modules/better-sqlite3/**'
  - 'out/renderer/ort/**'

win:
  icon: resources/icons/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]

nsis:
  # Override the space-containing default ("${productName} Setup ${version}").
  artifactName: '${productName}-Setup-${version}.${ext}'
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: SwarmMind
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico
  installerHeaderIcon: resources/icons/icon.ico

mac:
  # Explicit icon: without this, electron-builder's auto-resolver picks the
  # resources/icons/ directory (which holds only the Windows icon.ico) as the
  # mac icon source and app-builder aborts ("doesn't contain icons"). Point it
  # at the 1024x1024 PNG and let app-builder generate the .icns.
  icon: resources/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.developer-tools

linux:
  # Same reason as mac — give AppImage a concrete PNG instead of the icons/ dir.
  icon: resources/icon.png
  target:
    - target: AppImage
      arch: [x64]
  category: Development
